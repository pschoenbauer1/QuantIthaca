# Ephemeral Postgres for pytest integration tests.
#
#   docker compose -f docker/docker-compose.postgres-test.yml up -d
#
# Then (PowerShell):
#   $env:TEST_DATABASE_URL = "postgresql+psycopg://postgres:postgres@127.0.0.1:5433/quantithaca_test"
#   uv run pytest tests/python -m integration -v
#
# Stop:
#   docker compose -f docker/docker-compose.postgres-test.yml down

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quantithaca_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quantithaca_test"]
      interval: 2s
      timeout: 5s
      retries: 15
