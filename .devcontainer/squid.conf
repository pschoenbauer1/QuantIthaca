# Forward proxy: only allow CONNECT tunnels (i.e. HTTPS) to these domains.
# Squid reads the domain from the CONNECT request / TLS SNI -- no
# certificate interception, no TLS bumping, nothing to install.

acl allowed_domains dstdomain .anthropic.com anthropic.com
acl allowed_domains dstdomain .claude.ai claude.ai
acl allowed_domains dstdomain .platform.claude.com platform.claude.com
acl allowed_domains dstdomain downloads.claude.ai
acl CONNECT method CONNECT
acl SSL_ports port 443

# Allow HTTPS CONNECT only to the whitelist, on port 443 only
http_access allow CONNECT allowed_domains SSL_ports
http_access deny CONNECT

# Deny everything else (plain HTTP, other domains, other ports)
http_access deny all

http_port 3128
coredump_dir /var/spool/squid
access_log /var/log/squid/access.log